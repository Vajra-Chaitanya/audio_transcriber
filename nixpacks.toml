# nixpacks.toml
# Railway uses Nixpacks to build the project.
# This config ensures Prisma generates the correct client and
# migrations run automatically on every deployment.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "npx prisma migrate deploy && npm start"
